name: Sync Match Lineups En Vivo

on:
  schedule:
    # Run every 15 minutes during match windows (e.g. 16:00 to 04:00 UTC)
    - cron: '*/15 16-23,0-4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync-lineups:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: world-cup-predictor

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: world-cup-predictor/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Fetch and Map Lineups
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetchLineups.js

      - name: Commit and Push Changes
        working-directory: .
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add world-cup-predictor/public/lineups.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync live match lineups [skip ci]" && git push)
