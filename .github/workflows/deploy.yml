name: Deploy Predictor to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'world-cup-predictor/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: world-cup-predictor

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: world-cup-predictor/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Build Production Bundle
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: world-cup-predictor/dist
          branch: gh-pages
          clean: true
